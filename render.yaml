# Blueprint: Web + Postgres.
# Workflow service: Dashboard → New → Workflow (not expressible in Blueprint yet). Same repo; root ".";
# build `npm ci --include=dev && npm run build`; start `npm run workflow:start`. See README.
# Preview envs require Render Pro; manual mode opts in per PR with [render preview]
previews:
  generation: manual

databases:
  - name: blueprint-assistant-db
    plan: basic-256mb

services:
  - type: web
    name: blueprint-assistant-web
    runtime: node
    plan: starter
    # Do not set NODE_ENV=production in Blueprint env for the whole service.
    # Render may still inject NODE_ENV=production during build; plain `npm ci` then omits
    # devDependencies (`tsc` missing). `--include=dev` forces dev deps even then.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /health
    previews:
      plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blueprint-assistant-db
          property: connectionString
      - key: RENDER_API_KEY
        sync: false
      - key: WORKFLOW_SLUG
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PUBLIC_GITHUB_REPO
        sync: false
      - key: ANALYSIS_ENABLED
        value: "true"
      - key: BLUEPRINT_PUBLISH_ENABLED
        value: "true"
      - key: AUTO_DEPLOY_ENABLED
        value: "true"
      - key: RENDER_OWNER_ID
        sync: false
      - key: RENDER_DEPLOY_REGION
        value: oregon
      - key: RENDER_DEPLOY_PLAN
        value: starter
